server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/chuwu_assistant;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  global-config:
    db-config:
      id-type: assign_uuid
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: chuwu_assistant_demo_secret_key_2024
  access-expire: 604800
  refresh-expire: 2592000

# 微信小程序配置（开发模式用模拟登录）
wechat:
  appid: wx84bc2a7c986210fe
  secret: dev_mock_secret
  dev-mode: true

# 对象存储配置（开发模式用本地存储）
oss:
  endpoint:
  access-key:
  secret-key:
  bucket:

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
